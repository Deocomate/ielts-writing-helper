<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đặt lại mật khẩu — IELTS Type & Learn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { 'brand': '#11A683','brand-dark': '#0D8A6B','brand-light': '#E8F7F3','text-primary': '#0E101A','text-secondary': '#6D758D','text-disabled': '#B9BDC5','border-light': '#E1E4E8','app-bg': '#F9F9FA' }, fontFamily: { sans: ['Inter','Roboto','sans-serif'] }, boxShadow: { 'float': '0 4px 6px rgba(0,0,0,0.05), 0 10px 15px rgba(0,0,0,0.1)' } } } }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; color: #0E101A; -webkit-font-smoothing: antialiased; }
    .input-field:focus { border-color: #11A683; box-shadow: 0 0 0 3px rgba(17,166,131,0.15); outline: none; }
    .pw-strength-bar { height: 4px; border-radius: 2px; transition: width 0.3s, background-color 0.3s; }
  </style>
</head>
<body class="min-h-screen bg-app-bg flex flex-col">
  <header class="py-5 px-6 flex items-center max-w-7xl mx-auto w-full">
    <a href="/" class="flex items-center gap-2 group">
      <div class="w-8 h-8 bg-brand rounded-lg flex items-center justify-center group-hover:scale-105 transition-transform">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
      </div>
      <span class="text-base font-semibold text-text-primary">IELTS Type & Learn</span>
    </a>
  </header>

  <main class="flex-1 flex items-center justify-center px-4 py-10">
    <div class="w-full max-w-md">

      <!-- Reset form -->
      <div id="reset-form-section" class="bg-white rounded-2xl shadow-float border border-border-light p-8">
        <div class="w-14 h-14 bg-brand-light rounded-2xl flex items-center justify-center mx-auto mb-6">
          <svg class="w-7 h-7 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        </div>
        <h1 class="text-2xl font-bold text-text-primary text-center">Đặt mật khẩu mới</h1>
        <p class="mt-2 text-sm text-text-secondary text-center">Mật khẩu mới phải khác mật khẩu cũ.</p>

        <form id="reset-form" class="mt-6 space-y-4" novalidate>
          <div>
            <label for="new-pw" class="block text-sm font-medium text-text-primary mb-1.5">Mật khẩu mới</label>
            <div class="relative">
              <input id="new-pw" type="password" autocomplete="new-password" placeholder="Tối thiểu 8 ký tự"
                class="input-field w-full px-4 py-3 bg-app-bg border border-border-light rounded-lg text-sm text-text-primary placeholder-text-disabled transition-all pr-11" />
              <button type="button" id="toggle-new" class="absolute right-3 top-1/2 -translate-y-1/2 text-text-disabled hover:text-text-secondary cursor-pointer">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              </button>
            </div>
            <div class="mt-2 flex gap-1">
              <div id="s1" class="pw-strength-bar flex-1 bg-border-light"></div>
              <div id="s2" class="pw-strength-bar flex-1 bg-border-light"></div>
              <div id="s3" class="pw-strength-bar flex-1 bg-border-light"></div>
              <div id="s4" class="pw-strength-bar flex-1 bg-border-light"></div>
            </div>
          </div>
          <div>
            <label for="confirm-pw" class="block text-sm font-medium text-text-primary mb-1.5">Xác nhập mật khẩu</label>
            <div class="relative">
              <input id="confirm-pw" type="password" autocomplete="new-password" placeholder="Nhập lại mật khẩu"
                class="input-field w-full px-4 py-3 bg-app-bg border border-border-light rounded-lg text-sm text-text-primary placeholder-text-disabled transition-all pr-11" />
              <button type="button" id="toggle-confirm" class="absolute right-3 top-1/2 -translate-y-1/2 text-text-disabled hover:text-text-secondary cursor-pointer">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              </button>
            </div>
            <p id="match-hint" class="text-xs mt-1 hidden"></p>
          </div>
          <button type="submit" class="w-full py-3 bg-brand text-white text-sm font-semibold rounded-lg hover:bg-brand-dark transition-colors cursor-pointer">
            Cập nhật mật khẩu
          </button>
        </form>
      </div>

      <!-- Success state -->
      <div id="reset-success" class="hidden bg-white rounded-2xl shadow-float border border-border-light p-8 text-center">
        <div class="w-14 h-14 bg-green-100 rounded-2xl flex items-center justify-center mx-auto mb-6">
          <svg class="w-7 h-7 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h2 class="text-xl font-bold text-text-primary">Mật khẩu đã được cập nhật!</h2>
        <p class="mt-3 text-sm text-text-secondary">Bạn có thể đăng nhập bằng mật khẩu mới ngay bây giờ.</p>
        <a href="/login" class="mt-6 inline-block w-full py-3 bg-brand text-white text-sm font-semibold rounded-lg hover:bg-brand-dark transition-colors text-center">Đi đăng nhập ngay</a>
      </div>
    </div>
  </main>

  <script>
    document.getElementById('toggle-new').addEventListener('click', function() { const el = document.getElementById('new-pw'); el.type = el.type === 'password' ? 'text' : 'password'; });
    document.getElementById('toggle-confirm').addEventListener('click', function() { const el = document.getElementById('confirm-pw'); el.type = el.type === 'password' ? 'text' : 'password'; });
    document.getElementById('new-pw').addEventListener('input', function() {
      const val = this.value;
      const s = [val.length >= 8, /[A-Z]/.test(val), /[0-9]/.test(val), /[^A-Za-z0-9]/.test(val)];
      const score = s.filter(Boolean).length;
      const colors = ['', '#FF5E5E', '#FFD500', '#11A683', '#11A683'];
      [1,2,3,4].forEach(i => { document.getElementById('s' + i).style.backgroundColor = i <= score ? colors[score] : '#E1E4E8'; });
    });
    document.getElementById('reset-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const pw = document.getElementById('new-pw').value;
      const cpw = document.getElementById('confirm-pw').value;
      const hint = document.getElementById('match-hint');
      if (pw !== cpw) { hint.textContent = 'Mật khẩu không khớp.'; hint.className = 'text-xs mt-1 text-red-500'; hint.classList.remove('hidden'); return; }
      if (pw.length < 8) { hint.textContent = 'Mật khẩu cần tối thiểu 8 ký tự.'; hint.className = 'text-xs mt-1 text-red-500'; hint.classList.remove('hidden'); return; }
      document.getElementById('reset-form-section').classList.add('hidden');
      document.getElementById('reset-success').classList.remove('hidden');
    });
  </script>
</body>
</html>
