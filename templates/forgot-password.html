<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quên mật khẩu — IELTS Type & Learn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { 'brand': '#11A683','brand-dark': '#0D8A6B','brand-light': '#E8F7F3','text-primary': '#0E101A','text-secondary': '#6D758D','text-disabled': '#B9BDC5','border-light': '#E1E4E8','app-bg': '#F9F9FA' }, fontFamily: { sans: ['Inter','Roboto','sans-serif'] }, boxShadow: { 'float': '0 4px 6px rgba(0,0,0,0.05), 0 10px 15px rgba(0,0,0,0.1)' } } } }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; color: #0E101A; -webkit-font-smoothing: antialiased; }
    .input-field:focus { border-color: #11A683; box-shadow: 0 0 0 3px rgba(17,166,131,0.15); outline: none; }
  </style>
</head>
<body class="min-h-screen bg-app-bg flex flex-col">
  <header class="py-5 px-6 flex items-center max-w-7xl mx-auto w-full">
    <a href="/" class="flex items-center gap-2 group">
      <div class="w-8 h-8 bg-brand rounded-lg flex items-center justify-center group-hover:scale-105 transition-transform">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
      </div>
      <span class="text-base font-semibold text-text-primary">IELTS Type & Learn</span>
    </a>
  </header>

  <main class="flex-1 flex items-center justify-center px-4 py-10">
    <div class="w-full max-w-md">

      <!-- Step 1: Enter email -->
      <div id="step-email" class="bg-white rounded-2xl shadow-float border border-border-light p-8">
        <div class="w-14 h-14 bg-brand-light rounded-2xl flex items-center justify-center mx-auto mb-6">
          <svg class="w-7 h-7 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        </div>
        <h1 class="text-2xl font-bold text-text-primary text-center">Quên mật khẩu?</h1>
        <p class="mt-2 text-sm text-text-secondary text-center leading-relaxed">Nhập email của bạn. Chúng tôi sẽ gửi link đặt lại mật khẩu.</p>
        <form id="forgot-form" class="mt-6 space-y-4" novalidate>
          <div>
            <label for="email" class="block text-sm font-medium text-text-primary mb-1.5">Email</label>
            <input id="email" type="email" autocomplete="email" placeholder="you@example.com"
              class="input-field w-full px-4 py-3 bg-app-bg border border-border-light rounded-lg text-sm text-text-primary placeholder-text-disabled transition-all" />
          </div>
          <button type="submit" class="w-full py-3 bg-brand text-white text-sm font-semibold rounded-lg hover:bg-brand-dark transition-colors cursor-pointer">
            Gửi link đặt lại mật khẩu
          </button>
        </form>
        <div class="mt-5 text-center">
          <a href="/login" class="inline-flex items-center gap-1 text-sm text-text-secondary hover:text-text-primary transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            Quay lại đăng nhập
          </a>
        </div>
      </div>

      <!-- Step 2: Success message (hidden initially) -->
      <div id="step-success" class="hidden bg-white rounded-2xl shadow-float border border-border-light p-8 text-center">
        <div class="w-14 h-14 bg-green-100 rounded-2xl flex items-center justify-center mx-auto mb-6">
          <svg class="w-7 h-7 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h2 class="text-xl font-bold text-text-primary">Kiểm tra email của bạn!</h2>
        <p class="mt-3 text-sm text-text-secondary leading-relaxed">Chúng tôi đã gửi link đặt lại mật khẩu đến <strong id="sent-email" class="text-text-primary"></strong>. Link có hiệu lực trong 30 phút.</p>
        <div class="mt-6 p-4 bg-app-bg rounded-xl text-left">
          <p class="text-xs text-text-secondary">Đặt tên email không thâấy? Kiểm tra thư mục <strong>Spam</strong> hoặc</p>
          <button id="resend-btn" class="text-xs text-brand font-medium hover:text-brand-dark transition-colors cursor-pointer mt-1">→ Gửi lại email</button>
        </div>
        <a href="/login" class="mt-6 inline-block text-sm text-text-secondary hover:text-text-primary transition-colors">← Quay lại đăng nhập</a>
      </div>
    </div>
  </main>

  <script>
    document.getElementById('forgot-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) return;
      document.getElementById('sent-email').textContent = email;
      document.getElementById('step-email').classList.add('hidden');
      document.getElementById('step-success').classList.remove('hidden');
    });
    document.getElementById('resend-btn').addEventListener('click', function() {
      this.textContent = '✓ Đã gửi lại!';
      this.style.color = '#11A683';
      setTimeout(() => { this.textContent = '→ Gửi lại email'; this.style.color = ''; }, 3000);
    });
  </script>
</body>
</html>
