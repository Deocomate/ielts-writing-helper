<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — IELTS Type & Learn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{'brand':'#11A683','brand-dark':'#0D8A6B','brand-light':'#E8F7F3','text-primary':'#0E101A','text-secondary':'#6D758D','text-disabled':'#B9BDC5','border-light':'#E1E4E8','app-bg':'#F9F9FA'},fontFamily:{sans:['Inter','Roboto','sans-serif']},boxShadow:{'card':'0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03)','float':'0 4px 6px rgba(0,0,0,0.05), 0 10px 15px rgba(0,0,0,0.1)'}}}}  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>body{font-family:'Inter',sans-serif;color:#0E101A;-webkit-font-smoothing:antialiased;} .input-field:focus{border-color:#11A683;box-shadow:0 0 0 3px rgba(17,166,131,0.15);outline:none;}</style>
</head>
<body class="bg-app-bg min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="w-12 h-12 bg-text-primary rounded-2xl flex items-center justify-center mx-auto mb-3">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
      </div>
      <h1 class="text-xl font-black text-text-primary">Admin Portal</h1>
      <p class="text-sm text-text-secondary mt-1">IELTS Type & Learn</p>
    </div>

    <!-- Form -->
    <div class="bg-white rounded-2xl border border-border-light p-6 shadow-card">
      <div class="mb-4">
        <label class="block text-xs font-semibold text-text-secondary mb-1">Email quản trị</label>
        <input type="email" class="input-field w-full px-3 py-2.5 border border-border-light rounded-xl text-sm transition-all" placeholder="admin@ieltsl.vn" />
      </div>
      <div class="mb-2">
        <label class="block text-xs font-semibold text-text-secondary mb-1">Mật khẩu</label>
        <input type="password" class="input-field w-full px-3 py-2.5 border border-border-light rounded-xl text-sm transition-all" placeholder="••••••••" />
      </div>
      <div class="mb-5 text-right">
        <span class="text-xs text-brand hover:text-brand-dark cursor-pointer">Quên mật khẩu?</span>
      </div>
      <a href="/admin/dashboard" class="flex items-center justify-center w-full py-3 bg-text-primary text-white font-bold rounded-xl hover:bg-black transition-colors cursor-pointer text-sm">Đăng nhập</a>
    </div>

    <p class="text-xs text-text-disabled text-center mt-6">Đây là trang quản trị nội bộ. Không dành cho người dùng phổ thông.</p>
  </div>
</body>
</html>
